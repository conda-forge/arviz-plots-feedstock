schema_version: 1

context:
  name: arviz-plots
  version: "1.0.0"
  python-min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/arviz_plots-${{ version }}.tar.gz
  sha256: e8bb70824b50f09f7c527dac4519aef1b72cb0a9eadcd4da25b80c22a4bcef71

build:
  number: 0


build:
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.4,<4
    - pip
  run:
    - python >={{ python_min }}
    - arviz-base >=1.0.0,<1.1.0
    - arviz-stats >=1.0.0,<1.1.0

tests:
  - python:
      imports:
        - arviz-plots
      pip_ckech: true
      python_version:
        - ${{ python_min }}.*

about:
  summary: ArviZ-plots provides ready to use and composable plots for Bayesian Workflow.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://python.arviz.org/projects/plots/en/stable
  homepage: https://www.arviz.org
  repository: https://github.com/arviz-devs/arviz-plots

extra:
  recipe-maintainers:
    - OriolAbril
    - aloctavodia
    - tomicapretto
