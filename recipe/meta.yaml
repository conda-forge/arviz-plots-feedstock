{% set name = "arviz-plots" %}
{% set version = "0.8.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/arviz_plots-{{ version }}.tar.gz
  sha256: bc809a27bafbdf892bf88d01bfdff6bfa4d4e9ee9fcdf95ede9f95c5579357af

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.4,<4
    - pip
  run:
    - python >={{ python_min }}
    - arviz-base >=0.7.0
    - arviz-stats >=0.7.0

test:
  imports:
    - arviz_plots
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/arviz-devs/arviz-plots
  summary: ArviZ-plots provides ready to use and composable plots for Bayesian Workflow.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://arviz-plots.readthedocs.io
  dev_url: https://github.com/arviz-devs/arviz-plots

extra:
  recipe-maintainers:
    - OriolAbril
    - aloctavodia
    - tomicapretto
